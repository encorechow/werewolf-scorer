<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狼人杀积分系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0b10;
  --bg-card: #12141d;
  --bg-card-hover: #181b27;
  --bg-input: #1a1d2b;
  --border: #2a2d3d;
  --border-focus: #4a5580;
  --text: #e0ddd5;
  --text-dim: #7a7d8a;
  --text-bright: #f5f3ed;
  --good-primary: #6eafd4;
  --good-glow: #6eafd440;
  --good-bg: #6eafd412;
  --wolf-primary: #c94040;
  --wolf-glow: #c9404040;
  --wolf-bg: #c9404012;
  --gold: #d4a854;
  --gold-glow: #d4a85440;
  --accent: #8b7ec8;
  --success: #5cb87a;
  --danger: #c94040;
  --font-display: 'Cinzel', 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}

html { font-size: 15px; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #1a2a4a22 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -10%;
  left: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #2a152018 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app {
  max-width: 960px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 3rem;
  position: relative;
}

.header::after {
  content: '';
  display: block;
  width: 80px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 1.5rem auto 0;
}

.header h1 {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-bright);
  text-shadow: 0 0 40px #d4a85420;
}

.header .subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 0.5rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

/* Navigation Tabs */
.nav-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 2.5rem;
  background: var(--bg-card);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--border);
}

.nav-tab {
  flex: 1;
  padding: 0.8rem 1rem;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 9px;
  transition: all 0.25s ease;
}

.nav-tab:hover { color: var(--text); background: #ffffff06; }
.nav-tab.active {
  background: var(--bg-input);
  color: var(--text-bright);
  box-shadow: 0 2px 8px #00000030;
}

/* Sections */
.section { display: none; animation: fadeIn 0.3s ease; }
.section.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}

.card-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 1rem;
  letter-spacing: 0.05em;
}

/* Form Elements */
input[type="text"], input[type="number"], select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  padding: 0.6rem 0.8rem;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

input:focus, select:focus {
  border-color: var(--border-focus);
}

select { cursor: pointer; }
select option { background: var(--bg-card); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-input);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-focus);
}

.btn-primary {
  background: var(--gold);
  color: var(--bg-deep);
  border-color: var(--gold);
  font-weight: 700;
}

.btn-primary:hover {
  background: #e0b460;
  border-color: #e0b460;
  box-shadow: 0 0 20px var(--gold-glow);
}

.btn-danger {
  color: var(--danger);
  border-color: #c9404030;
}

.btn-danger:hover {
  background: var(--wolf-bg);
  border-color: var(--danger);
}

.btn-sm { padding: 0.4rem 0.7rem; font-size: 0.8rem; }

/* Player Management */
.player-input-row {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.player-input-row input { flex: 1; }

.player-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.player-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.8rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.85rem;
  animation: tagIn 0.2s ease;
}

@keyframes tagIn {
  from { opacity: 0; scale: 0.9; }
  to { opacity: 1; scale: 1; }
}

.player-tag .remove {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.15s;
}

.player-tag .remove:hover {
  background: var(--wolf-bg);
  color: var(--danger);
}

/* Scoring Section */
.winner-select {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1.5rem;
}

.winner-btn {
  flex: 1;
  padding: 1rem;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  font-family: var(--font-body);
}

.winner-btn .label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.3rem;
}

.winner-btn .name {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

.winner-btn.good:hover, .winner-btn.good.active {
  border-color: var(--good-primary);
  background: var(--good-bg);
  box-shadow: 0 0 30px var(--good-glow);
}

.winner-btn.good.active .name { color: var(--good-primary); }

.winner-btn.wolf:hover, .winner-btn.wolf.active {
  border-color: var(--wolf-primary);
  background: var(--wolf-bg);
  box-shadow: 0 0 30px var(--wolf-glow);
}

.winner-btn.wolf.active .name { color: var(--wolf-primary); }

/* Player Score Row */
.score-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.score-table th {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0.5rem 0.4rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.score-table th:first-child { text-align: left; }

.score-table td {
  padding: 0.5rem 0.3rem;
  text-align: center;
  vertical-align: middle;
  border-bottom: 1px solid #ffffff06;
}

.score-table td:first-child {
  text-align: left;
  font-weight: 500;
  color: var(--text-bright);
  white-space: nowrap;
}

.score-table select, .score-table input {
  width: 100%;
  min-width: 60px;
  font-size: 0.82rem;
  padding: 0.45rem 0.5rem;
}

.score-table .player-score {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.05rem;
  min-width: 50px;
}

.score-table .player-score.positive { color: var(--gold); }
.score-table .player-score.negative { color: var(--danger); }
.score-table .player-score.zero { color: var(--text-dim); }

.score-table .faction-good { color: var(--good-primary); }
.score-table .faction-wolf { color: var(--wolf-primary); }

/* Summary Bar */
.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

/* History */
.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 0.8rem;
  overflow: hidden;
  transition: all 0.2s;
}

.history-item:hover { border-color: var(--border-focus); }

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.2rem;
  cursor: pointer;
  user-select: none;
}

.history-header .game-info {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.history-header .game-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-bright);
}

.history-header .game-winner {
  font-size: 0.75rem;
  padding: 0.2rem 0.6rem;
  border-radius: 12px;
  font-weight: 500;
}

.history-header .game-winner.good {
  background: var(--good-bg);
  color: var(--good-primary);
  border: 1px solid #6eafd430;
}

.history-header .game-winner.wolf {
  background: var(--wolf-bg);
  color: var(--wolf-primary);
  border: 1px solid #c9404030;
}

.history-header .game-date {
  font-size: 0.8rem;
  color: var(--text-dim);
}

.history-header .actions {
  display: flex;
  gap: 0.4rem;
}

.history-detail {
  display: none;
  padding: 0 1.2rem 1rem;
}

.history-detail.open { display: block; }

.history-detail table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

.history-detail th {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: 500;
  padding: 0.4rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.history-detail th:first-child, .history-detail td:first-child { text-align: left; }

.history-detail td {
  padding: 0.4rem;
  text-align: center;
}

/* Leaderboard */
.leaderboard-row {
  display: flex;
  align-items: center;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid #ffffff06;
  transition: background 0.15s;
}

.leaderboard-row:hover { background: #ffffff04; }

.leaderboard-row .rank {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-right: 1rem;
  flex-shrink: 0;
}

.leaderboard-row .rank.top-1 { color: var(--gold); text-shadow: 0 0 12px var(--gold-glow); }
.leaderboard-row .rank.top-2 { color: #b0b8c8; }
.leaderboard-row .rank.top-3 { color: #c08a5a; }

.leaderboard-row .name {
  flex: 1;
  font-weight: 500;
  color: var(--text-bright);
}

.leaderboard-row .games {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-right: 1.5rem;
}

.leaderboard-row .total-score {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--gold);
  min-width: 60px;
  text-align: right;
}

.leaderboard-row .avg-score {
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-dim);
}

.empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }
.empty-state p { font-size: 0.9rem; }

/* Responsive */
@media (max-width: 640px) {
  .app { padding: 1.5rem 1rem 3rem; }
  .header h1 { font-size: 1.6rem; }
  .score-table { font-size: 0.82rem; }
  .score-table select, .score-table input { font-size: 0.78rem; padding: 0.35rem 0.3rem; min-width: 50px; }
  .winner-select { flex-direction: column; }
  .leaderboard-row .games { display: none; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-card);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 0.7rem 1.5rem;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 100;
  box-shadow: 0 4px 20px #00000060;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Confirm dialog */
.overlay {
  position: fixed;
  inset: 0;
  background: #00000080;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.dialog {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
  max-width: 380px;
  width: 90%;
  text-align: center;
}

.dialog h3 {
  font-family: var(--font-display);
  margin-bottom: 0.8rem;
  color: var(--text-bright);
}

.dialog p {
  font-size: 0.9rem;
  color: var(--text-dim);
  margin-bottom: 1.5rem;
}

.dialog .btn-group {
  display: flex;
  gap: 0.8rem;
  justify-content: center;
}

.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

/* Board Select */
.board-select {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.6rem;
}

.board-btn {
  padding: 0.8rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  font-family: var(--font-body);
}

.board-btn .board-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.board-btn .board-roles {
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.4;
}

.board-btn:hover {
  border-color: var(--border-focus);
  background: #ffffff06;
}

.board-btn.active {
  border-color: var(--accent);
  background: #8b7ec812;
  box-shadow: 0 0 20px #8b7ec818;
}

.board-btn.active .board-name { color: var(--accent); }

@media (max-width: 640px) {
  .board-select { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>WEREWOLF</h1>
    <div class="subtitle">狼人杀积分系统</div>
  </header>

  <nav class="nav-tabs">
    <button class="nav-tab active" data-tab="scoring">记分</button>
    <button class="nav-tab" data-tab="history">历史</button>
    <button class="nav-tab" data-tab="leaderboard">排行榜</button>
    <button class="nav-tab" data-tab="players">名单</button>
  </nav>

  <!-- Players Section -->
  <div id="players" class="section">
    <div class="card">
      <div class="card-title">参赛名单</div>
      <div class="player-input-row">
        <input type="text" id="newPlayerName" placeholder="输入玩家姓名" onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn btn-primary" onclick="addPlayer()">添加</button>
      </div>
      <div class="player-list" id="playerList"></div>
    </div>
  </div>

  <!-- Scoring Section -->
  <div id="scoring" class="section active">
    <div class="card">
      <div class="card-title">选择板子</div>
      <div class="board-select" id="boardSelect"></div>
    </div>

    <div class="card">
      <div class="card-title">获胜阵营</div>
      <div class="winner-select">
        <button class="winner-btn good" onclick="setWinner('good')" id="winnerGood">
          <div class="label">Victory</div>
          <div class="name">好人阵营</div>
        </button>
        <button class="winner-btn wolf" onclick="setWinner('wolf')" id="winnerWolf">
          <div class="label">Victory</div>
          <div class="name">狼人阵营</div>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">玩家得分</div>
      <div id="noPlayersHint" class="empty-state">
        <div class="icon">&#x1F3AD;</div>
        <p>请先到「名单」页面添加玩家</p>
      </div>
      <div class="table-scroll">
        <table class="score-table" id="scoreTable" style="display:none;">
          <thead>
            <tr>
              <th>玩家</th>
              <th>身份</th>
              <th>阵营</th>
              <th>得分</th>
            </tr>
          </thead>
          <tbody id="scoreBody"></tbody>
        </table>
      </div>
      <div class="action-bar" id="scoreActions" style="display:none;">
        <button class="btn" onclick="resetScoring()">重置本局</button>
        <button class="btn btn-primary" onclick="saveGame()">保存入库</button>
      </div>
    </div>
  </div>

  <!-- History Section -->
  <div id="history" class="section">
    <div id="historyList"></div>
    <div id="historyEmpty" class="empty-state">
      <div class="icon">&#x1F4DC;</div>
      <p>暂无历史记录</p>
    </div>
  </div>

  <!-- Leaderboard Section -->
  <div id="leaderboard" class="section">
    <div class="card">
      <div class="card-title">总积分排行</div>
      <div id="leaderboardList"></div>
      <div id="leaderboardEmpty" class="empty-state">
        <div class="icon">&#x1F3C6;</div>
        <p>暂无数据</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ======================== DATA ========================
const ALL_ROLES = {
  '平民':     { faction: 'good', skill: false },
  '预言家':   { faction: 'good', skill: false },
  '女巫':     { faction: 'good', skill: 'witch' },
  '猎人':     { faction: 'good', skill: 'hunter' },
  '守卫':     { faction: 'good', skill: 'guard' },
  '摄梦人':   { faction: 'good', skill: false },
  '守墓人':   { faction: 'good', skill: false },
  '混血儿':   { faction: 'good', skill: false },
  '狼':       { faction: 'wolf', skill: false },
  '狼王':     { faction: 'wolf', skill: false },
  '机械狼':   { faction: 'wolf', skill: false },
  '石像鬼':   { faction: 'wolf', skill: false },
  '刺客':     { faction: 'wolf', skill: false },
  '禁言长老': { faction: 'wolf', skill: false },
};

const BOARDS = [
  {
    id: 'wolf_king_guard',
    name: '狼王守卫',
    roles: ['平民', '预言家', '女巫', '猎人', '守卫', '摄梦人', '混血儿', '狼', '狼王'],
  },
  {
    id: 'mech_wolf',
    name: '机械狼',
    roles: ['平民', '预言家', '女巫', '猎人', '守卫', '狼', '机械狼', '禁言长老'],
  },
  {
    id: 'gargoyle_grave',
    name: '石像鬼守墓人',
    roles: ['平民', '预言家', '女巫', '猎人', '守墓人', '狼', '石像鬼'],
  },
  {
    id: 'assassin_guard',
    name: '刺客守卫',
    roles: ['平民', '预言家', '女巫', '猎人', '守卫', '狼', '刺客'],
  },
];

const FACTION_SCORES = {
  good: { win: 1, lose: -1 },
  wolf: { win: 1.5, lose: -1.5 },
};

// State
let players = [];
let games = [];
let winnerFaction = null;
let selectedBoard = null;

// ======================== API ========================
async function loadData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    players = data.players || [];
    games = data.games || [];
  } catch (e) {
    // Fallback to localStorage if server unavailable
    players = JSON.parse(localStorage.getItem('ww_players') || '[]');
    games = JSON.parse(localStorage.getItem('ww_games') || '[]');
  }
}

async function savePlayers() {
  try {
    await fetch('/api/players', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ players }),
    });
  } catch (e) {
    localStorage.setItem('ww_players', JSON.stringify(players));
  }
}

async function saveNewGame(game) {
  try {
    const res = await fetch('/api/games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game }),
    });
    return await res.json();
  } catch (e) {
    localStorage.setItem('ww_games', JSON.stringify(games));
    return { ok: true, total: games.length };
  }
}

async function deleteGameApi(idx) {
  try {
    await fetch(`/api/games/${idx}`, { method: 'DELETE' });
  } catch (e) {
    localStorage.setItem('ww_games', JSON.stringify(games));
  }
}

// ======================== TOAST ========================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ======================== TABS ========================
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// ======================== PLAYERS ========================
function renderPlayers() {
  const list = document.getElementById('playerList');
  list.innerHTML = players.map((p, i) => `
    <span class="player-tag">
      ${esc(p)}
      <button class="remove" onclick="removePlayer(${i})">&times;</button>
    </span>
  `).join('');
  renderScoreTable();
}

async function addPlayer() {
  const input = document.getElementById('newPlayerName');
  const name = input.value.trim();
  if (!name) return;
  if (players.includes(name)) { showToast('玩家已存在'); return; }
  players.push(name);
  await savePlayers();
  input.value = '';
  renderPlayers();
  showToast(`已添加 ${name}`);
}

async function removePlayer(idx) {
  players.splice(idx, 1);
  await savePlayers();
  renderPlayers();
}

// ======================== BOARDS ========================
function renderBoards() {
  const container = document.getElementById('boardSelect');
  container.innerHTML = BOARDS.map(b => {
    const goodRoles = b.roles.filter(r => ALL_ROLES[r].faction === 'good');
    const wolfRoles = b.roles.filter(r => ALL_ROLES[r].faction === 'wolf');
    return `
      <button class="board-btn ${selectedBoard && selectedBoard.id === b.id ? 'active' : ''}" onclick="selectBoard('${b.id}')">
        <div class="board-name">${esc(b.name)}</div>
        <div class="board-roles">${goodRoles.join(' / ')} vs ${wolfRoles.join(' / ')}</div>
      </button>
    `;
  }).join('');
}

function selectBoard(boardId) {
  selectedBoard = BOARDS.find(b => b.id === boardId);
  renderBoards();
  renderScoreTable();
}

// ======================== SCORING ========================
function setWinner(faction) {
  winnerFaction = faction;
  document.getElementById('winnerGood').classList.toggle('active', faction === 'good');
  document.getElementById('winnerWolf').classList.toggle('active', faction === 'wolf');
  recalcScores();
}

function renderScoreTable() {
  const tbody = document.getElementById('scoreBody');
  const table = document.getElementById('scoreTable');
  const hint = document.getElementById('noPlayersHint');
  const actions = document.getElementById('scoreActions');

  if (players.length === 0) {
    table.style.display = 'none';
    actions.style.display = 'none';
    hint.style.display = '';
    hint.querySelector('p').textContent = '请先到「名单」页面添加玩家';
    return;
  }

  if (!selectedBoard) {
    table.style.display = 'none';
    actions.style.display = 'none';
    hint.style.display = '';
    hint.querySelector('p').textContent = '请先选择板子';
    return;
  }

  hint.style.display = 'none';
  table.style.display = '';
  actions.style.display = '';

  const boardRoles = selectedBoard.roles;

  tbody.innerHTML = players.map((p, i) => {
    const roleOpts = boardRoles.map(rName => {
      const r = ALL_ROLES[rName];
      return `<option value="${rName}">${rName}</option>`;
    }).join('');

    return `
      <tr data-idx="${i}">
        <td>${esc(p)}</td>
        <td>
          <select onchange="onRoleChange(${i}, this.value)" id="role_${i}">
            <option value="">选择</option>
            ${roleOpts}
          </select>
        </td>
        <td class="faction-cell" id="faction_${i}">—</td>
        <td class="player-score zero" id="total_${i}">0</td>
      </tr>
    `;
  }).join('');
}

function onRoleChange(idx, roleName) {
  const role = ALL_ROLES[roleName];
  const factionCell = document.getElementById(`faction_${idx}`);

  if (!role) {
    factionCell.textContent = '—';
    factionCell.className = 'faction-cell';
    recalcScores();
    return;
  }

  factionCell.textContent = role.faction === 'good' ? '好人' : '狼人';
  factionCell.className = 'faction-cell ' + (role.faction === 'good' ? 'faction-good' : 'faction-wolf');

  recalcScores();
}

function recalcScores() {
  players.forEach((p, i) => {
    const roleSelect = document.getElementById(`role_${i}`);
    const role = ALL_ROLES[roleSelect.value];

    let total = 0;
    if (role && winnerFaction) {
      const scores = FACTION_SCORES[role.faction];
      total = role.faction === winnerFaction ? scores.win : scores.lose;
    }

    const el = document.getElementById(`total_${i}`);
    el.textContent = total;
    el.className = 'player-score ' + (total > 0 ? 'positive' : total < 0 ? 'negative' : 'zero');
  });
}

function resetScoring() {
  winnerFaction = null;
  selectedBoard = null;
  document.getElementById('winnerGood').classList.remove('active');
  document.getElementById('winnerWolf').classList.remove('active');
  renderBoards();
  renderScoreTable();
}

async function saveGame() {
  if (!selectedBoard) { showToast('请先选择板子'); return; }
  if (!winnerFaction) { showToast('请先选择获胜阵营'); return; }

  const entries = [];
  let valid = true;

  players.forEach((p, i) => {
    const roleName = document.getElementById(`role_${i}`).value;
    if (!roleName) { valid = false; return; }
    const role = ALL_ROLES[roleName];
    const scores = FACTION_SCORES[role.faction];
    const total = role.faction === winnerFaction ? scores.win : scores.lose;

    entries.push({
      player: p,
      role: roleName,
      faction: role.faction,
      total,
    });
  });

  if (!valid) { showToast('请为每个玩家选择身份'); return; }

  const game = {
    id: Date.now(),
    date: new Date().toLocaleString('zh-CN'),
    board: selectedBoard.name,
    winner: winnerFaction,
    entries,
  };

  games.push(game);
  await saveNewGame(game);
  resetScoring();
  showToast('已保存第 ' + games.length + ' 局');
  renderHistory();
  renderLeaderboard();
}

// ======================== HISTORY ========================
function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');

  if (games.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = games.slice().reverse().map((g, ri) => {
    const idx = games.length - 1 - ri;
    const rows = g.entries.map(e => `
      <tr>
        <td>${esc(e.player)}</td>
        <td>${esc(e.role)}</td>
        <td class="${e.faction === 'good' ? 'faction-good' : 'faction-wolf'}">${e.faction === 'good' ? '好人' : '狼人'}</td>
        <td style="font-weight:700;color:${e.total > 0 ? 'var(--gold)' : e.total < 0 ? 'var(--danger)' : 'var(--text-dim)'}">${e.total}</td>
      </tr>
    `).join('');

    return `
      <div class="history-item" id="game_${g.id}">
        <div class="history-header" onclick="toggleHistory(${g.id})">
          <div class="game-info">
            <span class="game-num">第 ${idx + 1} 局</span>
            <span class="game-winner ${g.winner}">${g.winner === 'good' ? '好人胜' : '狼人胜'}</span>
            ${g.board ? `<span style="font-size:0.75rem;color:var(--text-dim)">${esc(g.board)}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:1rem;">
            <span class="game-date">${g.date}</span>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteGame(${idx})">删除</button>
          </div>
        </div>
        <div class="history-detail" id="detail_${g.id}">
          <table>
            <tr><th>玩家</th><th>身份</th><th>阵营</th><th>得分</th></tr>
            ${rows}
          </table>
        </div>
      </div>
    `;
  }).join('');
}

function toggleHistory(id) {
  document.getElementById(`detail_${id}`).classList.toggle('open');
}

function deleteGame(idx) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>确认删除</h3>
      <p>删除第 ${idx + 1} 局的记录？此操作不可撤销。</p>
      <div class="btn-group">
        <button class="btn" onclick="this.closest('.overlay').remove()">取消</button>
        <button class="btn btn-danger" onclick="confirmDelete(${idx});this.closest('.overlay').remove()">删除</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function confirmDelete(idx) {
  games.splice(idx, 1);
  await deleteGameApi(idx);
  renderHistory();
  renderLeaderboard();
  showToast('已删除');
}

// ======================== LEADERBOARD ========================
function renderLeaderboard() {
  const list = document.getElementById('leaderboardList');
  const empty = document.getElementById('leaderboardEmpty');

  if (games.length === 0) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';

  const stats = {};
  games.forEach(g => {
    g.entries.forEach(e => {
      if (!stats[e.player]) stats[e.player] = { total: 0, games: 0 };
      stats[e.player].total += e.total;
      stats[e.player].games += 1;
    });
  });

  const sorted = Object.entries(stats)
    .map(([name, s]) => ({ name, ...s, avg: (s.total / s.games).toFixed(1) }))
    .sort((a, b) => b.total - a.total);

  list.innerHTML = sorted.map((s, i) => `
    <div class="leaderboard-row">
      <div class="rank ${i < 3 ? 'top-' + (i + 1) : ''}">${i + 1}</div>
      <div class="name">${esc(s.name)}</div>
      <div class="games">${s.games} 局</div>
      <div class="avg-score">均 ${s.avg}</div>
      <div class="total-score">${s.total}</div>
    </div>
  `).join('');
}

// ======================== UTILS ========================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ======================== INIT ========================
(async () => {
  await loadData();
  renderBoards();
  renderPlayers();
  renderHistory();
  renderLeaderboard();
})();
</script>
