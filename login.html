<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 狼人杀积分系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0a0b10;
  --bg-card: #12141d;
  --bg-input: #1a1d2b;
  --border: #2a2d3d;
  --border-focus: #4a5580;
  --text: #e0ddd5;
  --text-dim: #7a7d8a;
  --text-bright: #f5f3ed;
  --gold: #d4a854;
  --gold-glow: #d4a85440;
  --danger: #c94040;
  --font-display: 'Cinzel', 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}
html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #1a2a4a22 0%, transparent 70%);
  pointer-events: none;
}
.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2.5rem 2rem;
  width: 340px;
  text-align: center;
}
.login-card h1 {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--text-bright);
  margin-bottom: 0.3rem;
}
.login-card .subtitle {
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}
.login-card .divider {
  width: 50px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 2rem;
}
.login-card input {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 1rem;
  text-align: center;
  letter-spacing: 0.1em;
}
.login-card input:focus { border-color: var(--border-focus); }
.login-card input::placeholder { color: var(--text-dim); letter-spacing: 0.05em; }
.login-card button {
  width: 100%;
  padding: 0.75rem;
  background: var(--gold);
  color: var(--bg-deep);
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.login-card button:hover {
  background: #e0b460;
  box-shadow: 0 0 20px var(--gold-glow);
}
.error-msg {
  color: var(--danger);
  font-size: 0.82rem;
  margin-bottom: 0.8rem;
  min-height: 1.2em;
}
</style>
</head>
<body>
<div class="login-card">
  <h1>WEREWOLF</h1>
  <div class="subtitle">狼人杀积分系统</div>
  <div class="divider"></div>
  <form onsubmit="doLogin(event)">
    <input type="password" id="pwd" placeholder="输入密码" autofocus>
    <div class="error-msg" id="err"></div>
    <button type="submit">进入</button>
  </form>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      err.textContent = '密码错误';
      document.getElementById('pwd').value = '';
    }
  } catch {
    err.textContent = '网络错误';
  }
}
</script>
</body>
</html>
